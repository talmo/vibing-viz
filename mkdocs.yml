site_name: Vibing-Viz
site_description: 3D visualization for pose tracking kinematics
site_author: Talmo Pereira
site_url: https://vibing-viz.readthedocs.io
repo_url: https://github.com/talmo/vibing-viz
repo_name: talmo/vibing-viz
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/cube-outline

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            heading_level: 2
            merge_init_into_class: true
            docstring_style: google
  - autorefs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Examples: getting-started/examples.md
  - User Guide:
    - Overview: guide/overview.md
    - Data Structures: guide/data-structures.md
    - Visualization: guide/visualization.md
    - Camera Views: guide/cameras.md
    - Export: guide/export.md
  - API Reference:
    - Core: api/core.md
    - Visualization: api/visualization.md
    - UI: api/ui.md
    - Utils: api/utils.md
  - Development:
    - Contributing: development/contributing.md
    - Architecture: development/architecture.md
    - Testing: development/testing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/talmo/vibing-viz
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/vibing-viz/