# Read the Docs configuration file
version: 2

# Build documentation in the docs/ directory with MkDocs
mkdocs:
  configuration: mkdocs.yml

# Build environment
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Python requirements
python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .