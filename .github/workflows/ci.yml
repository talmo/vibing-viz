name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Set up Python
        run: uv python install 3.12
        
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Run ruff
        run: uv run ruff check .
        
      - name: Run ruff format check
        run: uv run ruff format --check .
        
      - name: Run black check
        run: uv run black --check .
        
      - name: Run mypy
        run: uv run mypy vibing_viz

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]  # macos-14 is Apple Silicon
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
        
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-glx libglib2.0-0 libsm6 libxrender1 libxext6 libxkbcommon-x11-0 libdbus-1-3
          
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          export QT_QPA_PLATFORM=offscreen
          xvfb-run -a uv run pytest --cov=vibing_viz --cov-report=xml
          
      - name: Run tests (Windows/macOS)
        if: runner.os != 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest --cov=vibing_viz --cov-report=xml
        
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest'
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Build package
        run: uv build
        
      - name: Check build
        run: |
          ls -la dist/
          uv run twine check dist/*
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/